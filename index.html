<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startup Idea Coach</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      line-height: 1.55;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin-bottom: 8px;
    }

    .header p {
      margin: 0;
      color: #4b5563;
    }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      background: #eef2ff;
      color: #3730a3;
    }

    .status.error {
      background: #fef2f2;
      color: #991b1b;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 6px;
    }

    input, select, textarea, button {
      width: 100%;
      font: inherit;
    }

    input, select, textarea {
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 14px;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .idea-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      margin-top: 14px;
      background: #fbfdff;
    }

    .idea-card h3 {
      margin-bottom: 8px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #e0ecff;
      color: #1d4ed8;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .muted {
      color: #6b7280;
    }

    .hidden {
      display: none;
    }

    .result-box {
      white-space: pre-wrap;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
    }

    .selected {
      border: 2px solid #111827;
      background: #f3f4f6;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    ul.inline-list {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    @media (max-width: 900px) {
      .grid, .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AI Startup Idea Coach</h1>
      <p>사용자 프로필과 JSON 기반 지식 베이스를 바탕으로 사업 아이템을 추천하는 프로토타입입니다.</p>
      <div id="appStatus" class="status">지식 베이스를 불러오는 중입니다...</div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>1. 사용자 프로필 입력</h2>

          <label for="name">이름 또는 닉네임</label>
          <input id="name" placeholder="예: 희문" />

          <div class="two-col">
            <div>
              <label for="major">전공/배경</label>
              <input id="major" placeholder="예: 영어영문학, 디자인, 개발" />
            </div>
            <div>
              <label for="experience">경험 수준</label>
              <select id="experience">
                <option value="beginner">초보</option>
                <option value="intermediate">중간</option>
                <option value="advanced">숙련</option>
              </select>
            </div>
          </div>

          <div class="two-col">
            <div>
              <label for="capital">초기 자본</label>
              <select id="capital">
                <option value="low">적음 (0~50만 원)</option>
                <option value="mid">중간 (50~300만 원)</option>
                <option value="high">높음 (300만 원 이상)</option>
              </select>
            </div>
            <div>
              <label for="time">투자 가능 시간</label>
              <select id="time">
                <option value="low">적음</option>
                <option value="mid">보통</option>
                <option value="high">많음</option>
              </select>
            </div>
          </div>

          <div class="two-col">
            <div>
              <label for="risk">위험 감수 성향</label>
              <select id="risk">
                <option value="low">낮음</option>
                <option value="mid">보통</option>
                <option value="high">높음</option>
              </select>
            </div>
            <div>
              <label for="mode">선호 운영 방식</label>
              <select id="mode">
                <option value="online">온라인</option>
                <option value="offline">오프라인</option>
                <option value="hybrid">하이브리드</option>
              </select>
            </div>
          </div>

          <label for="interests">관심 분야</label>
          <input id="interests" placeholder="예: 교육, 콘텐츠, 패션, 생산성, 취업" />

          <label for="skills">보유 기술/강점</label>
          <input id="skills" placeholder="예: 글쓰기, 발표, 영상편집, SNS 운영, 코딩" />

          <label for="notes">추가 설명</label>
          <textarea id="notes" placeholder="예: 대학생이라 큰 자본은 없고, 혼자 시작할 수 있는 온라인 중심 아이템을 원함"></textarea>

          <button class="primary" id="analyzeBtn" disabled>프로필 분석 및 아이템 추천</button>
        </div>

        <div class="card hidden" id="ideasSection">
          <h2>2. 추천 사업 아이템</h2>
          <p class="muted">JSON 기반 지식 베이스에서 적합한 사업 유형을 골라 추천합니다.</p>
          <div id="ideasContainer"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>프로필 분석 결과</h2>
          <div id="analysisOutput" class="result-box">아직 분석 전입니다.</div>
        </div>

        <div class="card hidden" id="planSection">
          <h2>3. 선택 아이템 구체화</h2>
          <div id="selectedIdeaInfo" class="result-box" style="margin-bottom: 12px;"></div>
          <button class="primary hidden" id="planBtn">이 아이템 구체화하기</button>
          <div id="planOutput" class="result-box" style="margin-top: 14px;">아직 생성 전입니다.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const analyzeBtn = document.getElementById("analyzeBtn");
    const analysisOutput = document.getElementById("analysisOutput");
    const ideasSection = document.getElementById("ideasSection");
    const ideasContainer = document.getElementById("ideasContainer");
    const planSection = document.getElementById("planSection");
    const selectedIdeaInfo = document.getElementById("selectedIdeaInfo");
    const planBtn = document.getElementById("planBtn");
    const planOutput = document.getElementById("planOutput");
    const appStatus = document.getElementById("appStatus");

    let knowledgeBase = null;
    let currentIdeas = [];
    let selectedIdea = null;
    let currentProfile = null;

    async function loadJSON(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Failed to load ${path} (${response.status})`);
      }
      return response.json();
    }

    async function initializeKnowledgeBase() {
      const [
        startupPrinciples,
        validationRules,
        profileRules,
        education,
        content,
        saas,
        ideaTemplate
      ] = await Promise.all([
        loadJSON("./knowledge_base/core/startup_principles.json"),
        loadJSON("./knowledge_base/core/validation_rules.json"),
        loadJSON("./knowledge_base/user_interpretation/profile_rules.json"),
        loadJSON("./knowledge_base/business_types/education.json"),
        loadJSON("./knowledge_base/business_types/content.json"),
        loadJSON("./knowledge_base/business_types/saas.json"),
        loadJSON("./knowledge_base/templates/idea_output_template.json")
      ]);

      knowledgeBase = {
        startupPrinciples,
        validationRules,
        profileRules,
        businessTypes: {
          education,
          content,
          saas
        },
        ideaTemplate
      };
    }

    function setStatus(message, isError = false) {
      appStatus.textContent = message;
      appStatus.className = isError ? "status error" : "status";
    }

    function getProfile() {
      return {
        name: document.getElementById("name").value.trim(),
        major: document.getElementById("major").value.trim(),
        experience: document.getElementById("experience").value,
        capital: document.getElementById("capital").value,
        time: document.getElementById("time").value,
        risk: document.getElementById("risk").value,
        mode: document.getElementById("mode").value,
        interests: document.getElementById("interests").value.trim(),
        skills: document.getElementById("skills").value.trim(),
        notes: document.getElementById("notes").value.trim()
      };
    }

    function containsAny(text, keywords) {
      const lower = (text || "").toLowerCase();
      return keywords.some(keyword => lower.includes(keyword.toLowerCase()));
    }

    function getKeywordBoosts(profile) {
      const combined = [
        profile.major,
        profile.interests,
        profile.skills,
        profile.notes
      ].join(" ").toLowerCase();

      const boosts = {
        education: 0,
        content: 0,
        saas: 0
      };

      if (containsAny(combined, ["영어", "english", "교육", "teaching", "글쓰기", "writing", "튜터", "학습"])) {
        boosts.education += 3;
      }

      if (containsAny(combined, ["콘텐츠", "content", "sns", "영상", "편집", "브랜딩", "마케팅", "뉴스레터"])) {
        boosts.content += 3;
      }

      if (containsAny(combined, ["개발", "코딩", "프로그래밍", "python", "html", "자동화", "생산성", "tool", "app", "saas"])) {
        boosts.saas += 3;
      }

      return boosts;
    }

    function scoreBusinessTypes(profile) {
      const rules = knowledgeBase.profileRules;
      const scores = {
        education: 0,
        content: 0,
        saas: 0
      };

      const matchedNotes = [];

      const capitalRule = rules.capital_rules[profile.capital];
      const timeRule = rules.time_rules[profile.time];
      const riskRule = rules.risk_rules[profile.risk];
      const modeRule = rules.mode_rules[profile.mode];

      [capitalRule, timeRule, modeRule].forEach(rule => {
        if (!rule) return;

        (rule.preferred_models || []).forEach(model => {
          if (scores[model] !== undefined) scores[model] += 2;
        });

        (rule.avoid_models || []).forEach(model => {
          if (scores[model] !== undefined) scores[model] -= 2;
        });

        (rule.notes || []).forEach(note => matchedNotes.push(note));
      });

      (riskRule?.preferred_traits || []).forEach(trait => matchedNotes.push(`Risk preference suggests: ${trait}`));
      (riskRule?.avoid_traits || []).forEach(trait => matchedNotes.push(`Avoid trait: ${trait}`));

      const keywordBoosts = getKeywordBoosts(profile);
      Object.keys(scores).forEach(key => {
        scores[key] += keywordBoosts[key] || 0;
      });

      return { scores, matchedNotes };
    }

    function buildAnalysis(profile, scoreResult) {
      const { scores, matchedNotes } = scoreResult;
      const sorted = Object.entries(scores)
        .sort((a, b) => b[1] - a[1])
        .map(([type, score]) => `${type} (${score})`);

      const strengths = [];
      const constraints = [];
      const fit = [];

      if (scores.education >= 3) strengths.push("교육형/설명형 비즈니스 적합도가 높음");
      if (scores.content >= 3) strengths.push("콘텐츠/큐레이션 기반 비즈니스 적합도가 높음");
      if (scores.saas >= 3) strengths.push("도구형/소프트웨어형 비즈니스 확장 가능성이 있음");

      if (profile.capital === "low") constraints.push("초기 자본이 적어 고정비가 큰 모델은 부적합");
      if (profile.time === "low") constraints.push("반복 수작업이 많은 사업은 부담이 큼");
      if (profile.mode === "online") fit.push("온라인 중심 저비용 검증형 모델 우선");
      if (profile.risk === "low") fit.push("리스크가 낮고 파일럿 테스트가 쉬운 모델 우선");

      if (strengths.length === 0) strengths.push("명확한 특정 유형보다는 범용 역량 기반 탐색이 필요한 상태");
      if (constraints.length === 0) constraints.push("제약은 상대적으로 적지만, 초기 범위 통제가 중요함");
      if (fit.length === 0) fit.push("현재 조건상 작은 검증형 사업부터 시작하는 편이 적절함");

      return {
        strengths,
        constraints,
        fit,
        rankedTypes: sorted,
        matchedNotes
      };
    }

    function createIdeaFromBusinessType(typeKey, profile, score) {
      const type = knowledgeBase.businessTypes[typeKey];
      const template = JSON.parse(JSON.stringify(knowledgeBase.ideaTemplate));

      const titleMap = {
        education: "Problem-Focused Education Offer",
        content: "Niche Content / Curation Product",
        saas: "Micro SaaS for a Repetitive Problem"
      };

      const summaryMap = {
        education: "특정 학습자 집단의 분명한 문제를 해결하는 작은 교육형 상품 또는 서비스",
        content: "좁은 관심사를 가진 사용자에게 유용한 정보를 꾸준히 큐레이션하거나 패키징하는 모델",
        saas: "반복적인 문제를 단순한 웹 도구나 자동화 서비스로 해결하는 모델"
      };

      const customerMap = {
        education: "특정 시험·기술·문제 해결이 필요한 학습자",
        content: "특정 주제에 꾸준히 시간을 쓰는 니치 사용자",
        saas: "반복 업무나 귀찮은 워크플로를 가진 사용자"
      };

      const revenueMap = {
        education: type.revenue_models[0] || "one-time payment",
        content: type.revenue_models[0] || "subscription",
        saas: type.revenue_models[0] || "subscription"
      };

      template.idea_title = titleMap[typeKey];
      template.business_type = typeKey;
      template.summary = summaryMap[typeKey];
      template.fit_reason = [
        `This business type scored ${score} based on the user's capital, time, risk, and operating mode.`,
        ...(type.best_for || []).slice(0, 2)
      ];
      template.assumptions = [
        "The user's stated interests reflect real willingness to work in this domain.",
        "The user is willing to start with a narrow MVP rather than a broad launch."
      ];
      template.target_customer.primary = customerMap[typeKey];
      template.target_customer.secondary = "초기에는 더 좁은 세부 집단으로 다시 축소 필요";
      template.problem_statement = (type.evaluation_points || [])[0] || "A concrete user problem needs to be defined.";
      template.solution_outline = (type.common_formats || [])[0] || "A small offer format should be tested first.";
      template.value_proposition = (type.evaluation_points || [])[1] || "A practical difference from alternatives must be made clear.";
      template.revenue_model = revenueMap[typeKey];
      template.mvp = (type.mvp_examples || [])[0] || "A small MVP should be tested first.";
      template.channels = profile.mode === "online"
        ? ["Instagram", "Notion", "Google Form", "Landing Page"]
        : profile.mode === "offline"
          ? ["Local community", "Offline pilot", "Existing network"]
          : ["Instagram", "Local community", "Pilot session"];
      template.risks = (type.major_risks || []).slice(0, 3);
      template.next_steps = (type.starter_next_steps || []).slice(0, 4);
      template.confidence = {
        user_fit: Math.min(0.95, 0.45 + score * 0.08),
        market_confidence: 0.45,
        execution_feasibility: profile.time === "low" ? 0.55 : 0.72
      };

      return template;
    }

    function generateIdeasFromKnowledgeBase(profile, scoreResult) {
      const sortedTypes = Object.entries(scoreResult.scores)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3);

      return sortedTypes.map(([typeKey, score]) =>
        createIdeaFromBusinessType(typeKey, profile, score)
      );
    }

    function renderAnalysis(profile, analysis) {
      const name = profile.name || "사용자";

      analysisOutput.textContent =
`${name}의 현재 프로필을 바탕으로 한 1차 분석

[강점]
- ${analysis.strengths.join("\n- ")}

[제약]
- ${analysis.constraints.join("\n- ")}

[적합한 방향]
- ${analysis.fit.join("\n- ")}

[사업 유형 점수]
- ${analysis.rankedTypes.join("\n- ")}

[규칙 기반 해석 메모]
- ${analysis.matchedNotes.join("\n- ") || "No additional notes."}

[해석]
이 결과는 JSON 기반 규칙과 사업 유형 문서를 바탕으로 생성된 초기 가설입니다. 실제 시장 조사와 사용자 검증이 뒤따라야 합니다.`;
    }

    function renderIdeas(ideas) {
      ideasContainer.innerHTML = "";

      ideas.forEach((idea, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "idea-card";

        wrapper.innerHTML = `
          <h3>${idea.idea_title}</h3>
          <p>${idea.summary}</p>
          <div>
            <span class="tag">Type: ${idea.business_type}</span>
            <span class="tag">User Fit: ${idea.confidence.user_fit.toFixed(2)}</span>
            <span class="tag">Execution: ${idea.confidence.execution_feasibility.toFixed(2)}</span>
          </div>
          <p><strong>Primary Customer:</strong> ${idea.target_customer.primary}</p>
          <p><strong>Value Proposition:</strong> ${idea.value_proposition}</p>
          <p><strong>MVP:</strong> ${idea.mvp}</p>
          <p><strong>Risks:</strong> ${idea.risks.join(", ")}</p>
          <button class="secondary" data-index="${index}">이 아이템 선택</button>
        `;

        ideasContainer.appendChild(wrapper);
      });

      document.querySelectorAll("[data-index]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const index = Number(e.target.dataset.index);
          selectedIdea = currentIdeas[index];

          document.querySelectorAll(".idea-card").forEach(card => {
            card.classList.remove("selected");
          });

          e.target.closest(".idea-card").classList.add("selected");

          selectedIdeaInfo.textContent =
`선택된 아이템: ${selectedIdea.idea_title}

Business Type: ${selectedIdea.business_type}
Summary: ${selectedIdea.summary}
Primary Customer: ${selectedIdea.target_customer.primary}
Problem: ${selectedIdea.problem_statement}
MVP: ${selectedIdea.mvp}
Revenue Model: ${selectedIdea.revenue_model}`;

          planSection.classList.remove("hidden");
          planBtn.classList.remove("hidden");
          planOutput.textContent = "구체화 버튼을 누르면 초기 사업 구조를 생성합니다.";
        });
      });
    }

    function buildPlan(profile, idea) {
      const channels = idea.channels.map(ch => `- ${ch}`).join("\n");
      const nextSteps = idea.next_steps.map(step => `- ${step}`).join("\n");
      const risks = idea.risks.map(risk => `- ${risk}`).join("\n");

      return `
[초기 사업 구조]
1. 핵심 고객
- ${idea.target_customer.primary}
- ${idea.target_customer.secondary}

2. 해결할 문제
- ${idea.problem_statement}

3. 해결 방향
- ${idea.solution_outline}

4. 가치 제안
- ${idea.value_proposition}

5. 수익 구조
- ${idea.revenue_model}

6. MVP
- ${idea.mvp}

7. 추천 채널
${channels}

8. 주요 리스크
${risks}

9. 다음 단계
${nextSteps}

10. 검증 원칙
- 이 제안은 확정 답이 아니라 초기 가설입니다.
- 실제 사용자의 반응과 지불 의사를 반드시 따로 검증해야 합니다.
- 시장 규모나 성공 가능성은 아직 확정할 수 없습니다.
      `.trim();
    }

    analyzeBtn.addEventListener("click", () => {
      if (!knowledgeBase) return;

      const profile = getProfile();
      currentProfile = profile;
      selectedIdea = null;

      const scoreResult = scoreBusinessTypes(profile);
      const analysis = buildAnalysis(profile, scoreResult);
      currentIdeas = generateIdeasFromKnowledgeBase(profile, scoreResult);

      renderAnalysis(profile, analysis);
      renderIdeas(currentIdeas);

      ideasSection.classList.remove("hidden");
      planSection.classList.add("hidden");
    });

    planBtn.addEventListener("click", () => {
      if (!selectedIdea || !currentProfile) return;
      planOutput.textContent = buildPlan(currentProfile, selectedIdea);
    });

    async function boot() {
      try {
        await initializeKnowledgeBase();
        analyzeBtn.disabled = false;
        setStatus("지식 베이스 로딩 완료. 이제 추천을 실행할 수 있습니다.");
      } catch (error) {
        console.error(error);
        setStatus("지식 베이스를 불러오지 못했습니다. 로컬 파일 직접 열기 대신 로컬 서버나 GitHub Pages에서 실행해야 할 수 있습니다.", true);
      }
    }

    boot();
  </script>
</body>
</html>
